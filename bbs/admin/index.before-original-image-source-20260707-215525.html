<script src="../../config.js"></script>
<script>
  const CLOVER_ADMIN_FIX_VERSION = "2026-07-06-admin-single-file-stable-v4";
  const API = (window.CLOVER_CONFIG && window.CLOVER_CONFIG.appsScriptUrl) || "https://script.google.com/macros/s/AKfycbzqDpcpuVFdeIKq0A0W_QuvRY2teMY9F54B8QQNiAhujJ3zi67kVbztPm4UcDOLxW1j/exec";
  const ADMIN_PASSWORD = "1111";
  const CACHE_KEY = "cloverAdminDashboardCache:v4";
  const state = { applications: [], boardPosts: [], heroSlides: [], events: [], panel: "applications", query: "", started: false };
  const editors = {
    hero: { preview: "#heroPreview", input: "#heroImage", aspectClass: "hero-aspect", outputW: 1280, outputH: 720, src: "", file: null, scale: 1, x: 0, y: 0, dirty: false, name: "hero-image.jpg" },
    event: { preview: "#eventPreview", input: "#eventImage", aspectClass: "event-aspect", outputW: 960, outputH: 420, src: "", file: null, scale: 1, x: 0, y: 0, dirty: false, name: "event-image.jpg" }
  };
  const $ = (selector, root = document) => root.querySelector(selector);
  const qa = (selector, root = document) => [...root.querySelectorAll(selector)];
  const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
  const formatDate = (value) => { const date = new Date(Number(value) || value); return Number.isNaN(date.getTime()) ? "-" : new Intl.DateTimeFormat("ko-KR", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }).format(date); };
  const drivePreviewUrl = (value) => { const raw = String(value || "").trim(); const match = raw.match(/\/d\/([^/]+)|[?&]id=([^&]+)/); const id = match && (match[1] || match[2]); return id ? `https://drive.google.com/thumbnail?id=${encodeURIComponent(id)}&sz=w1000` : raw; };
  const assetUrl = (value) => { const raw = String(value || "").trim(); if (!raw) return ""; if (/drive\.google\.com|docs\.google\.com/i.test(raw)) return drivePreviewUrl(raw); if (/^(https?:|data:|blob:)/i.test(raw)) return raw; return `../../${raw.replace(/^\/+/, "")}`; };
  const normalizeHeroTitle = (value) => String(value ?? "").replace("가입, 로그인 X", "가입 X, 로그인 X");
  const normalizeEventPlace = (value) => { const text = String(value ?? ""); return !text || /광안리|해운대|클로버 서면|스카이 라운지|클로버 운지/.test(text) ? "서면 클로버 라운지 (승인 후 안내)" : text; };
  const normalizeEventTitle = (station, title) => ({ "21 - 27세": "설레는 첫 만남", "24 - 29세": "티키타카 로테이션 소개팅", "27 - 36세": "퇴근 후 약속", "30 - 37세": "매일 똑같은 일상, 새로운 만남", "34 - 39세": "편안한 대화" }[String(station ?? "")] || String(title ?? ""));
  const normalizeEventImage = (station, image) => { const value = String(station ?? ""); if (image) return image; if (value.includes("24") || value.includes("34")) return "assets/event-2.jpg"; if (value.includes("27")) return "assets/event-3.jpg"; return "assets/event-1.jfif"; };
  const normalizeHeroSlides = (items = []) => items.map((item) => ({ ...item, title: normalizeHeroTitle(item.title) }));
  const normalizeEvents = (items = []) => items.map((item) => ({ ...item, title: normalizeEventTitle(item.station, item.title), place: normalizeEventPlace(item.place), image: normalizeEventImage(item.station, item.image) }));
  const post = async (payload) => { const body = new URLSearchParams({ payload: JSON.stringify(payload) }); const response = await fetch(API, { method: "POST", body }); const result = await response.json(); if (!result.ok) throw new Error(result.error || "요청에 실패했습니다."); return result; };
  function isLoggedIn() { return sessionStorage.getItem("cloverAdminAuthenticated") === "true"; }
  function showLogin() { $("#adminApp").hidden = true; $("#adminLoginView").hidden = false; setTimeout(() => $("#adminPasswordInput")?.focus(), 30); }
  function showAdmin() { $("#adminLoginView").hidden = true; $("#adminApp").hidden = false; }
  function goHome() { location.href = location.protocol === "file:" ? new URL("../../index.html", location.href).href : "/"; }
  function genderKind(item) { const value = `${item?.["성별"] || ""} ${item?.["신청 구분"] || ""}`; if (/남자|남성|\b남\b/.test(value)) return "male"; if (/여자|여성|\b여\b/.test(value)) return "female"; return ""; }
  function genderLabel(item) { const kind = genderKind(item); return kind === "male" ? "남성 신청" : kind === "female" ? "여성 신청" : (item["신청 구분"] || "신청"); }
  function field(label, value) { const empty = value == null || value === "" || value === "-"; return `<dl class="field${empty ? " is-empty" : ""}"><dt>${escapeHtml(label)}</dt><dd>${escapeHtml(empty ? "미작성" : value)}</dd></dl>`; }
  function applicationNumber(item, fallbackIndex, list) { const row = Number(item.id); if (Number.isFinite(row) && row >= 2) return row - 1; const sorted = [...list].sort((a, b) => Number(a["접수일시"] || 0) - Number(b["접수일시"] || 0)); return sorted.findIndex((entry) => entry === item) + 1 || fallbackIndex + 1; }
  function boardNumberMap() { const sorted = [...state.boardPosts].sort((a, b) => Number(a.createdAt || 0) - Number(b.createdAt || 0)); return new Map(sorted.map((item, index) => [String(item.id), index + 1])); }
  function renderApplications() {
